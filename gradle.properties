kotlin.code.style=official

#Gradle
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options\="-Xmx4096M"

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true
android.experimental.enableScreenshotTest=true

#MPP
kotlin.mpp.androidSourceSetLayoutVersion=2
kotlin.mpp.enableCInteropCommonization=true

#Development
development=true

#Performance
org.gradle.parallel=true
org.gradle.daemon=true

#Experimenal
org.jetbrains.compose.experimental.jscanvas.enabled=true

#Dokka v2 migration
org.jetbrains.dokka.experimental.gradle.pluginMode=V2Enabled

#Maven Central Publishing (gradle-maven-publish-plugin 0.34.0+)
mavenCentralPublishing=true
mavenCentralAutomaticPublishing=false
signAllPublications=true

# Local dependency resolution mode for demo apps:
# - local (default): resolve charts modules from this checkout.
# - maven: resolve io.github.dautovicharis artifacts from Maven repositories (requires chartsPublishedVersion).
# - snapshot: resolve io.github.dautovicharis snapshot artifacts only (requires chartsPublishedVersion ending with -SNAPSHOT).
# chartsDependencyMode=local
# chartsPublishedVersion=2.3.0-SNAPSHOT
